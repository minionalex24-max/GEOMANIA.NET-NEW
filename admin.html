<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geomania | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script defer src="admin.js"></script>
</head>
<body data-page="admin">
  <main class="admin-wrap">
    <section id="loginView" class="admin-card">
      <h1>Admin Login</h1>
      <p class="muted">Authorized personnel only.</p>
      <form id="loginForm" class="form-grid" autocomplete="off">
        <input name="username" required placeholder="Username" autocomplete="username" />
        <input name="password" type="password" required placeholder="Password" autocomplete="current-password" />
        <button class="btn btn-primary" type="submit">Login</button>
      </form>
      <p id="loginMessage" class="status"></p>
    </section>

    <section id="dashboardView" class="admin-dashboard hidden">
      <aside class="admin-sidebar">
        <h2>Geomania Admin</h2>
        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
      </aside>
      <section class="admin-main">
        <h1>Content Manager</h1>

        <div class="toolbar">
          <button id="modeAdd" class="btn btn-primary" type="button">Add mode</button>
          <button id="modeDelete" class="btn" type="button">Delete mode</button>
        </div>

        <form id="contentForm" class="form-grid">
          <select name="type" id="contentType" required>
            <option value="maps">Add Map</option>
            <option value="articles">Add Article</option>
            <option value="news">Add News</option>
            <option value="presentations">Add Presentation</option>
            <option value="films">Add Film</option>
          </select>
          <input name="title" required placeholder="Title" />
          <input name="category" required placeholder="Category / Theme" />
          <textarea name="description" required placeholder="Description"></textarea>
          <input name="tags" placeholder="Tags (comma-separated)" />
          <input name="difficulty" placeholder="Difficulty (optional)" />
          <input name="classLevel" placeholder="Class (optional)" />
          <input name="imageFile" type="file" accept="image/*" />
          <button class="btn btn-primary" type="submit">Add Content</button>
        </form>

        <section id="deletePanel" class="hidden">
          <h2>Delete Content</h2>
          <div class="toolbar">
            <select id="deleteType">
              <option value="maps">Maps</option>
              <option value="articles">Articles</option>
              <option value="news">News</option>
              <option value="presentations">Presentations</option>
              <option value="films">Films</option>
            </select>
          </div>
          <div id="deleteList" class="stack"></div>
        </section>

        <p id="adminNotice" class="status"></p>
      </section>
    </section>
  </main>
</body>
</html>
