<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geomania | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script defer src="admin.js"></script>
</head>
<body data-page="admin">
  <main class="admin-wrap">
    <section id="setupView" class="admin-card hidden">
      <h1>Admin Setup</h1>
      <p class="muted">Create the first admin account on this device. Credentials are not hardcoded in client code.</p>
      <form id="setupForm" class="form-grid">
        <input name="username" minlength="4" required placeholder="Create username" />
        <input name="password" type="password" minlength="8" required placeholder="Create password" />
        <button class="btn btn-primary" type="submit">Create Admin</button>
      </form>
      <p id="setupMessage" class="status"></p>
    </section>

    <section id="loginView" class="admin-card hidden">
      <h1>Admin Login</h1>
      <p class="muted">Sign in to manage Geomania content.</p>
      <form id="loginForm" class="form-grid">
        <input name="username" required placeholder="Username" autocomplete="username" />
        <input name="password" type="password" required placeholder="Password" autocomplete="current-password" />
        <button class="btn btn-primary" type="submit">Login</button>
      </form>
      <p id="loginMessage" class="status"></p>
    </section>

    <section id="dashboardView" class="admin-dashboard hidden">
      <aside class="admin-sidebar">
        <h2>Geomania Admin</h2>
        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
      </aside>
      <section class="admin-main">
        <h1>Content Manager</h1>
        <form id="contentForm" class="form-grid">
          <select name="type" id="contentType" required>
            <option value="maps">Add Map</option>
            <option value="articles">Add Article</option>
            <option value="news">Add News</option>
            <option value="presentations">Add Presentation</option>
            <option value="films">Add Film</option>
          </select>
          <input name="title" required placeholder="Title" />
          <input name="category" required placeholder="Category / Theme" />
          <textarea name="description" required placeholder="Description"></textarea>
          <input name="tags" placeholder="Tags (comma-separated)" />
          <input name="difficulty" placeholder="Difficulty (optional)" />
          <input name="classLevel" placeholder="Class (optional)" />
          <button class="btn btn-primary" type="submit">Add Content</button>
        </form>
        <p id="adminNotice" class="status"></p>
      </section>
    </section>
  </main>
</body>
</html>
